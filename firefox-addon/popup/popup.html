<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>アドホック・ニコ</h1>
    <div class="status">
      <div id="dot" class="dot"></div>
      <span id="statusText">未接続</span>
    </div>
    <div class="field">
      <label for="sid">セッションID</label>
      <input type="text" id="sid" placeholder="管理画面から送信または手動入力">
    </div>
    <div class="actions">
      <button id="tabBtn" class="btn tab-toggle">このタブ: OFF</button>
      <button id="resetBtn" class="btn reset" title="リセット">↻</button>
    </div>
  </div>
  <script src="../config.js"></script>
  <script src="popup.js"></script>
</body>
</html>
